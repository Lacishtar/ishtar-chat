<template id="ovs-message-template">
  <div class="ovs-message">
    <img class="ovs-avatar" data-slot="avatar" alt="" />
    <div class="ovs-body">
      <div class="ovs-meta">
        <span class="ovs-author" data-slot="author"></span>
        <span class="ovs-badges" data-slot="badges"></span>
      </div>
      <div class="ovs-text" data-slot="message"></div>
    </div>
  </div>
</template>
